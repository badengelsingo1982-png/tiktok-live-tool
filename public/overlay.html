<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>Overlay</title>
<!-- PWA: 2台目端末でホーム画面アプリ化(全画面・前面運用向け)。OBSでは無視される -->
<link rel="manifest" href="overlay.webmanifest">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="LIVE通知">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  /* OBSブラウザソース用: 背景は完全透過 */
  html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; width: 100vw; height: 100vh; }
  * { box-sizing: border-box; font-family: "Hiragino Sans", "Noto Sans JP", sans-serif; }

  /* ---- ギフト/フォローアラート (中央上部) ---- */
  #alert {
    position: absolute; top: 8vh; left: 50%; transform: translateX(-50%) scale(0.6);
    display: none; align-items: center; gap: 16px;
    padding: 18px 32px; border-radius: 20px;
    background: rgba(15, 15, 25, 0.82);
    border: 2px solid #ff2d55;
    box-shadow: 0 0 30px rgba(255, 45, 85, 0.55);
    opacity: 0; transition: none;
  }
  #alert.show { display: flex; animation: pop 0.45s cubic-bezier(.2,1.6,.4,1) forwards; }
  #alert.hide { animation: fadeout 0.4s ease forwards; }
  @keyframes pop { to { opacity: 1; transform: translateX(-50%) scale(1); } }
  @keyframes fadeout { from { opacity: 1; } to { opacity: 0; transform: translateX(-50%) scale(0.85); } }

  #alert img.avatar { width: 56px; height: 56px; border-radius: 50%; border: 2px solid #fff; }
  #alert img.gift { width: 64px; height: 64px; }
  #alert .txt { color: #fff; }
  #alert .txt .name { font-size: 22px; font-weight: 700; color: #ffd166; }
  #alert .txt .desc { font-size: 26px; font-weight: 800; margin-top: 2px; }
  #alert .txt .desc .count { color: #ff2d55; font-size: 32px; }

  /* ---- コメント欄 (左下) ---- */
  #chat {
    position: absolute; left: 20px; bottom: 20px; width: 420px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .msg {
    display: flex; align-items: flex-start; gap: 10px;
    background: rgba(10, 10, 18, 0.65); border-radius: 14px;
    padding: 8px 14px; color: #fff;
    animation: slidein 0.3s ease;
  }
  @keyframes slidein { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: none; } }
  .msg img { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; }
  .msg .noavatar { width: 32px; height: 32px; border-radius: 50%; background: #444; flex-shrink: 0; }
  .msg .name { font-size: 13px; color: #9be3ff; font-weight: 600; }
  .msg .body { font-size: 16px; line-height: 1.4; word-break: break-word; }
  .msg.event .body { color: #ffd166; font-weight: 700; }

  /* ---- いいねカウンター (右下) ---- */
  #likes {
    position: absolute; right: 24px; bottom: 24px;
    background: rgba(10,10,18,0.65); color: #fff;
    border-radius: 999px; padding: 10px 22px;
    font-size: 20px; font-weight: 700;
  }
  #likes .heart { color: #ff2d55; }

  /* ---- 音声有効化プロンプト (iPad/スマホのブラウザ用。OBSでは表示されない) ---- */
  #tapToStart {
    position: absolute; inset: 0; z-index: 9999;
    display: none; align-items: center; justify-content: center;
    background: rgba(0, 0, 0, 0.55); cursor: pointer;
  }
  #tapToStart .box {
    padding: 26px 44px; border-radius: 18px;
    background: rgba(15, 15, 25, 0.9); border: 2px solid #ff2d55;
    color: #fff; font-size: 26px; font-weight: 800; text-align: center; line-height: 1.5;
    box-shadow: 0 0 30px rgba(255, 45, 85, 0.5);
  }

  /* ---- 右上の操作ボタン (OBSでは非表示) ---- */
  #controls {
    position: absolute; top: 12px; right: 12px; z-index: 9998;
    display: none; gap: 8px;
  }
  #controls button {
    padding: 10px 16px; border: 0; border-radius: 12px;
    background: rgba(15, 15, 25, 0.85); color: #fff;
    font-size: 15px; font-weight: 700; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #audioToggle.off { background: rgba(120, 20, 20, 0.9); }
</style>
</head>
<body>
  <div id="alert">
    <img class="avatar" id="alertAvatar" alt="" style="display:none">
    <div class="txt">
      <div class="name" id="alertName"></div>
      <div class="desc" id="alertDesc"></div>
    </div>
    <img class="gift" id="alertGift" alt="" style="display:none">
  </div>

  <div id="chat"></div>
  <div id="likes"><span class="heart">&#10084;</span> <span id="likeCount">0</span></div>

  <div id="tapToStart"><div class="box">🔊 画面をタップして<br>音声を有効化</div></div>
  <div id="controls">
    <button id="audioToggle" type="button">🔊 音声ON</button>
    <button id="btnDashboard" type="button">⚙ 設定へ</button>
  </div>

<script src="socket.io/socket.io.js"></script>
<script>
// ?u=<ユーザー名> でそのユーザーのイベントを購読 (マルチユーザー)
const overlayUser = new URLSearchParams(location.search).get('u') || '';
// ?debug=1 で音まわりのログを画面左下に表示(音が鳴らない時の原因調査用)
const DEBUG = new URLSearchParams(location.search).get('debug') === '1';
function debugLog(msg) {
  try {
    console.log('[sound]', msg);
    if (!DEBUG) return;
    let el = document.getElementById('sndlog');
    if (!el) {
      el = document.createElement('div');
      el.id = 'sndlog';
      el.style.cssText = 'position:fixed;left:8px;bottom:8px;z-index:9999;max-width:60vw;' +
        'font:12px monospace;color:#0f0;background:rgba(0,0,0,.7);padding:6px;border-radius:4px;' +
        'white-space:pre-wrap;pointer-events:none';
      document.body.appendChild(el);
    }
    const line = document.createElement('div');
    line.textContent = msg;
    el.appendChild(line);
    while (el.children.length > 8) el.removeChild(el.firstChild);
  } catch (e) {}
}
// サブパス配信時のプレフィックス (例 /tiktok)。ルート直下配信なら空文字
const B = window.__BASE__ || '';
const socket = io(overlayUser ? { path: B + '/socket.io', auth: { overlay: overlayUser } } : { path: B + '/socket.io' });
let config = null;
socket.on('config', c => { config = c; applyEq(); });
// ユーザー未指定なら注意表示(OBSにURLを?u=付きで登録する必要がある)
if (!overlayUser && !window.obsstudio) {
  window.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById('chat');
    if (el) el.innerHTML = '<div class="msg event"><div class="noavatar"></div><div><div class="name">設定</div><div class="body">URLに ?u=ユーザー名 を付けてください（ダッシュボードのオーバーレイURLを使用）</div></div></div>';
  });
}

// ---- 自動リロード: サーバーのビルドIDが変わったら(=更新デプロイ)自動で最新版に ----
let myBuildId = null;
socket.on('buildId', id => {
  if (myBuildId && id && id !== myBuildId) { location.reload(); return; }
  myBuildId = id;
});

// ギフト別サウンド (サウンドボード)
let soundboard = { library: [], giftRules: [] };
socket.on('soundboard', sb => { if (sb) soundboard = sb; });
function giftSoundFor(giftName, fallback) {
  try {
    const rule = soundboard.giftRules.find(r => r.gift && r.gift.toLowerCase() === String(giftName || '').toLowerCase());
    if (rule) {
      const lib = soundboard.library.find(l => l.id === rule.soundId);
      if (lib) return lib.file;
    }
  } catch (e) {}
  return fallback;
}
socket.on('status', s => {
  document.getElementById('likeCount').textContent = (s.likes || 0).toLocaleString();
  // 配信していない間はオーディオセッションを手放す。掴んだままだと音楽アプリ等の
  // 音が止まってしまうため。配信が始まったら自動で掴み直す(要アンロック済み)
  if (isOBS || !audioUnlocked) return;
  if (s.connected && !audioActive) startAudioSession();
  else if (!s.connected && audioActive) stopAudioSession('配信が未接続');
});

// ---- 音声アンロック (iPad/iOS/スマホのブラウザ対策) ----
// iOSのSafari/Chromeはユーザー操作なしに音を鳴らせない。
// OBSブラウザソースでは window.obsstudio が存在するので自動許可扱いにする。
let audioCtx = null;
let audioUnlocked = false;
const isOBS = !!window.obsstudio;
// 無音WAV(HTMLAudioElementのアンロック用)
const SILENT_WAV = 'data:audio/wav;base64,UklGRuwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YcgAAACAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgA==';
// mp3再生用の使い回しAudio要素(iOSはこの1要素をジェスチャ内でアンロックすれば以降再生可能)
const sfx = new Audio();
sfx.preload = 'auto';
// 効果音の再生中は無音ループを止める(無音と効果音が重なってiOSで音が途切れるのを防ぐ)
function sfxBusy() { return !!sfx.src && !sfx.paused && !sfx.ended; }
sfx.addEventListener('playing', () => { stopKeepAlive(); });
['ended', 'error', 'pause'].forEach(ev =>
  sfx.addEventListener(ev, () => { if (audioUnlocked && !isOBS) startKeepAlive(); })
);
// 再生失敗の原因を追えるように(?debug=1 で画面表示)
sfx.addEventListener('error', () => {
  const e = sfx.error;
  debugLog('効果音エラー: ' + (e ? 'code=' + e.code : '不明') + ' / ' + sfx.currentSrc);
});

// ---- サウンドEQ(イコライザー): 効果音を低/中/高音・全体音量で調整 ----
// config.audio = { eqEnabled, eqLow, eqMid, eqHigh, volume }。有効時のみWeb Audio経由に切替。
let eqGraph = null, eqFailed = false;
function ensureEqGraph() {
  if (eqGraph || eqFailed) return eqGraph;
  // createMediaElementSource(sfx) を呼ぶと、sfxの音は以後スピーカーへ直接出ず
  // AudioContext経由でしか鳴らなくなる(元に戻せない)。アンロック前=suspended の
  // うちに繋ぐと、効果音がまったく鳴らなくなる。必ず running を確認してから作る
  if (!audioUnlocked) return null;
  if (!ensureAudioCtx()) return null;
  if (audioCtx.state !== 'running') {
    try { audioCtx.resume(); } catch (e) {}
    debugLog('EQ待機: AudioContextが' + audioCtx.state + 'のため今回はEQ無しで再生');
    return null; // EQよりも「音が鳴ること」を優先
  }
  try {
    const source = audioCtx.createMediaElementSource(sfx);
    const low = audioCtx.createBiquadFilter(); low.type = 'lowshelf'; low.frequency.value = 200;
    const mid = audioCtx.createBiquadFilter(); mid.type = 'peaking'; mid.frequency.value = 1000; mid.Q.value = 1;
    const high = audioCtx.createBiquadFilter(); high.type = 'highshelf'; high.frequency.value = 3500;
    const gain = audioCtx.createGain();
    source.connect(low); low.connect(mid); mid.connect(high); high.connect(gain); gain.connect(audioCtx.destination);
    eqGraph = { source, low, mid, high, gain };
    debugLog('EQ有効化');
    applyEq();
  } catch (e) { eqFailed = true; debugLog('EQ構築失敗、EQ無しで再生: ' + e.message); }
  return eqGraph;
}
// EQ経由にしたのに音が出ない端末(iOSのMediaElementSource不具合)への保険。
// フィルタを外してsource→destinationへ繋ぎ直し、EQは諦めて音を優先する
function bypassEq() {
  if (!eqGraph) return;
  try {
    eqGraph.source.disconnect();
    eqGraph.source.connect(audioCtx.destination);
    eqGraph = null; eqFailed = true;
    debugLog('EQをバイパスしました(音が出ないため)');
  } catch (e) {}
}
function applyEq() {
  const a = (config && config.audio) || {};
  // EQ有効かつまだ経由していなければ、この時点でWeb Audioに接続
  if (a.eqEnabled && !eqGraph && !eqFailed) ensureEqGraph();
  if (!eqGraph) return;
  try {
    const on = !!a.eqEnabled;
    eqGraph.low.gain.value  = on ? (+a.eqLow  || 0) : 0;
    eqGraph.mid.gain.value  = on ? (+a.eqMid  || 0) : 0;
    eqGraph.high.gain.value = on ? (+a.eqHigh || 0) : 0;
    eqGraph.gain.gain.value = on ? (a.volume == null ? 1 : +a.volume) : 1;
  } catch (e) {}
}

// ---- バックグラウンド維持: 無音ループを常時再生してオーディオセッションを生かす ----
// iOS/スマホのブラウザはバックグラウンドのタブを数分でサスペンドし、AudioContext/TTSが
// 止まる。無音を再生し続けると「音を出しているタブ」扱いになり停止しにくくなる。
function makeSilentWavUrl(seconds) {
  const sr = 8000, n = sr * seconds, buf = new ArrayBuffer(44 + n), dv = new DataView(buf);
  const wr = (o, s) => { for (let i = 0; i < s.length; i++) dv.setUint8(o + i, s.charCodeAt(i)); };
  wr(0, 'RIFF'); dv.setUint32(4, 36 + n, true); wr(8, 'WAVE');
  wr(12, 'fmt '); dv.setUint32(16, 16, true); dv.setUint16(20, 1, true); dv.setUint16(22, 1, true);
  dv.setUint32(24, sr, true); dv.setUint32(28, sr, true); dv.setUint16(32, 1, true); dv.setUint16(34, 8, true);
  wr(36, 'data'); dv.setUint32(40, n, true);
  for (let i = 0; i < n; i++) dv.setUint8(44 + i, 128); // 128 = 8bit無音
  return URL.createObjectURL(new Blob([buf], { type: 'audio/wav' }));
}
let keepAlive = null;
// 無音ループでオーディオセッションを掴んでいるか。掴んでいる間はOSが
// 「このタブが音楽を再生中」とみなし、他アプリ(音楽・動画)の音を止めてしまう。
// そのため必要な時だけ掴み、不要になったら必ず手放す
let audioActive = false;
// OSに「メディア再生中」と認識させ、背面でも音を止められにくくする(iPad Split View等で有効)
function setupMediaSession() {
  if (!('mediaSession' in navigator)) return;
  try {
    navigator.mediaSession.metadata = new MediaMetadata({ title: 'LIVEオーバーレイ', artist: '配信ツール' });
    navigator.mediaSession.playbackState = 'playing';
    // コントロールセンターの停止/一時停止で本当に止まるようにする。
    // 以前は何もしないハンドラだったため、どこからも止められなかった
    try { navigator.mediaSession.setActionHandler('pause', () => stopAudioSession('コントロールセンター')); } catch (e) {}
    try { navigator.mediaSession.setActionHandler('stop', () => stopAudioSession('コントロールセンター')); } catch (e) {}
    try { navigator.mediaSession.setActionHandler('play', () => startAudioSession()); } catch (e) {}
  } catch (e) {}
}
// オーディオセッションを完全に手放す。これで他アプリの音が戻る
function stopAudioSession(why) {
  audioActive = false;
  try { if (keepAlive) { keepAlive.pause(); keepAlive.currentTime = 0; } } catch (e) {}
  try { sfx.pause(); } catch (e) {}
  try { if (window.speechSynthesis) speechSynthesis.cancel(); } catch (e) {}
  try { if (audioCtx && audioCtx.state === 'running') audioCtx.suspend(); } catch (e) {}
  try { if (navigator.mediaSession) { navigator.mediaSession.playbackState = 'none'; navigator.mediaSession.metadata = null; } } catch (e) {}
  try { if (wakeLock) { wakeLock.release(); wakeLock = null; } } catch (e) {}
  syncAudioButton();
  debugLog('音声セッション停止: ' + (why || ''));
}
// 手放したセッションを掴み直す
function startAudioSession() {
  audioActive = true;
  try { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); } catch (e) {}
  startKeepAlive();
  requestWakeLock();
  syncAudioButton();
  debugLog('音声セッション開始');
}
function syncAudioButton() {
  const b = document.getElementById('audioToggle');
  if (!b) return;
  b.textContent = audioActive ? '🔊 音声ON' : '🔇 音声OFF';
  b.classList.toggle('off', !audioActive);
}
function startKeepAlive() {
  // 停止中は掴み直さない(他アプリの音を奪わないため)
  if (!audioActive) return;
  // 効果音の再生中は無音を鳴らさない(重ねるとiOSで効果音が止まることがある)
  if (sfxBusy()) return;
  try {
    if (!keepAlive) {
      keepAlive = new Audio(makeSilentWavUrl(1));
      keepAlive.loop = true;
    }
    // 停止していなくても頭出しして鳴らし直す(iOSの再生停止タイマーをリセットする狙い)
    try { keepAlive.currentTime = 0; } catch (e) {}
    const p = keepAlive.play();
    if (p && p.catch) p.catch(() => {});
    setupMediaSession();
  } catch (e) {}
}
function stopKeepAlive() { try { if (keepAlive) keepAlive.pause(); } catch (e) {} }
// 画面スリープ防止(2台目端末をサウンドボードとして使う運用向け)
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator && !wakeLock && !document.hidden) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    }
  } catch (e) {}
}
// タブ復帰・フォーカス時にオーディオを立て直す
function resumeAudio() {
  if (!audioActive) return; // 停止中は何もしない(他アプリの音を奪わない)
  ensureAudioCtx();
  try { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); } catch (e) {}
  startKeepAlive();
  try { if (window.speechSynthesis && speechSynthesis.paused) speechSynthesis.resume(); } catch (e) {}
  requestWakeLock();
}
if (!isOBS) {
  document.addEventListener('visibilitychange', () => { if (!document.hidden) resumeAudio(); });
  window.addEventListener('focus', resumeAudio);
  window.addEventListener('pageshow', resumeAudio);
  // 定期ハートビート: 10秒の停止タイマーに間に合うよう8秒ごとに無音を鳴らし直す
  setInterval(resumeAudio, 8000);
  // タブ/PWAを閉じた時に必ずセッションを手放す(閉じたのに音を掴んだままにしない)
  window.addEventListener('pagehide', () => stopAudioSession('ページを閉じた'));
  // 右上の操作ボタンを表示
  const ctrls = document.getElementById('controls');
  if (ctrls) ctrls.style.display = 'flex';
  // 音声ON/OFF
  const btn = document.getElementById('audioToggle');
  if (btn) {
    btn.addEventListener('click', e => {
      e.stopPropagation(); // 画面タップのアンロック処理と二重に反応させない
      if (audioActive) stopAudioSession('ボタン');
      else { if (!audioUnlocked) unlockAudio(); else startAudioSession(); }
    });
  }
  // 設定(ダッシュボード)へ。PWAは全画面で戻るボタンが無いため1タップで行けるようにする
  const dash = document.getElementById('btnDashboard');
  if (dash) {
    dash.addEventListener('click', e => {
      e.stopPropagation();
      stopAudioSession('設定へ移動'); // 離れる前にオーディオセッションを手放す
      location.href = B + '/dashboard';
    });
  }
  // PWA(ホーム画面アプリ)化のためService Worker登録。OBSでは登録しない
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register(B + '/sw.js').catch(() => {}));
  }
}

function ensureAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
  return audioCtx;
}
function unlockAudio() {
  ensureAudioCtx();
  try { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); } catch (e) {}
  // WebAudio: 無音を1発鳴らして再生権限を獲得 (ビープ用)
  try {
    if (audioCtx) {
      const b = audioCtx.createBuffer(1, 1, 22050);
      const src = audioCtx.createBufferSource();
      src.buffer = b; src.connect(audioCtx.destination); src.start(0);
    }
  } catch (e) {}
  // HTMLAudioElement: 無音WAVを再生してアンロック (mp3効果音用。iOSはこれが別枠)
  try {
    sfx.src = SILENT_WAV;
    const p = sfx.play();
    if (p && p.then) p.then(() => { try { sfx.pause(); sfx.currentTime = 0; } catch (e) {} }).catch(() => {});
  } catch (e) {}
  // TTS(speechSynthesis)も無音発話でウォームアップ
  try {
    if (window.speechSynthesis) {
      const warm = new SpeechSynthesisUtterance('');
      warm.volume = 0; speechSynthesis.speak(warm);
    }
  } catch (e) {}
  audioUnlocked = true;
  // 無音ループ開始(バックグラウンドでもオーディオセッションを維持)
  audioActive = true;
  startKeepAlive();
  syncAudioButton();
  // 画面スリープ防止(2台目端末運用向け)
  requestWakeLock();
  // アンロック後(AudioContextがrunning)になって初めてEQを組む。
  // ここより前に組むと sfx が鳴らなくなる。ensureEqGraph 側でも守っている
  applyEq();
  const t = document.getElementById('tapToStart');
  if (t) t.style.display = 'none';
}
// OBS以外(iPad等の実ブラウザ)ではタップ待ちオーバーレイを即表示
const tapEl = document.getElementById('tapToStart');
if (isOBS) {
  audioUnlocked = true;
} else if (tapEl) {
  tapEl.style.display = 'flex';
  tapEl.addEventListener('click', unlockAudio);
}
['click', 'touchend', 'keydown'].forEach(evt =>
  window.addEventListener(evt, () => { if (!audioUnlocked) unlockAudio(); }, { passive: true })
);
// 自動アンロック試行: iOS以外(PC/Android/OBS)は操作なしで有効化できる。
// iOSは失敗するのでタップ待ち表示のまま(仕様上タップ1回は省略不可)。
if (!isOBS && tapEl) {
  try {
    const test = new Audio(SILENT_WAV);
    const p = test.play();
    if (p && p.then) p.then(() => { try { test.pause(); } catch (e) {} if (!audioUnlocked) unlockAudio(); }).catch(() => {});
  } catch (e) {}
}

// EQ経由の再生が実際に進んでいるか監視し、進まなければEQをバイパスして鳴らし直す
function watchEqPlayback() {
  if (!eqGraph) return;
  setTimeout(() => {
    // 再生できる状態(readyState>=3)で再生中のはずなのに再生位置が動いていない
    // = 音が出ていない。読み込みが遅いだけの場合を誤検知しないよう readyState も見る
    if (eqGraph && !sfx.paused && sfx.readyState >= 3 && sfx.currentTime === 0) {
      const url = sfx.src;
      bypassEq();
      try { sfx.load(); sfx.play(); } catch (e) {}
      debugLog('EQ経由で無音だったため鳴らし直し: ' + url);
    }
  }, 600);
}

// ---- 音声再生 (mp3が無ければWebAudioビープにフォールバック) ----
function beep(freq, dur) {
  try {
    ensureAudioCtx();
    if (audioCtx && audioCtx.state === 'suspended') { try { audioCtx.resume(); } catch (e) {} }
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = freq; o.type = 'sine';
    g.gain.setValueAtTime(0.25, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch (e) {}
}
function playSound(url, fallbackFreq) {
  // 音声OFF中は鳴らさない(ボタンやコントロールセンターで止めた状態)
  if (!isOBS && !audioActive) { debugLog('音声OFF中のため再生しない'); return; }
  if (!url) {
    // サウンド未設定。ダッシュボードで音を割り当てるまではビープが鳴る
    debugLog('サウンド未設定のためビープ');
    beep(fallbackFreq, 0.5);
    return;
  }
  // サウンドは "/s/..." とベースパス抜きで保存されているのでここで補う
  if (url.charAt(0) === '/') url = B + url;
  // アンロック済みのsfx要素を使い回す(iOSで new Audio() が鳴らない対策)。失敗時はビープ
  try {
    // EQ有効ならWeb Audio経由に切替。経由時はAudioContextを起こしておく
    if (config && config.audio && config.audio.eqEnabled) {
      ensureEqGraph();
      if (audioCtx && audioCtx.state === 'suspended') { try { audioCtx.resume(); } catch (e) {} }
    }
    // 無音ループを先に止めてから鳴らす(重なりを避ける)
    stopKeepAlive();
    watchEqPlayback();
    // src代入で頭出しされるので currentTime は触らない
    // (読み込み前に currentTime を書くと一部ブラウザで例外になり、無音になっていた)
    sfx.src = url;
    sfx.load();
    debugLog('再生: ' + url);
    const p = sfx.play();
    if (p && p.catch) p.catch(err => {
      debugLog('play()拒否: ' + (err && err.name ? err.name : err));
      beep(fallbackFreq, 0.5);
    });
  } catch (e) {
    debugLog('再生例外: ' + (e && e.message ? e.message : e));
    beep(fallbackFreq, 0.5);
  }
}

// ---- TTS (読み上げ) ----
const ttsQueue = [];
let speaking = false;
// 端末の音声一覧(男女の声選択に使用)。voiceschangedで更新
let ttsVoices = [];
function loadVoices() { try { ttsVoices = window.speechSynthesis ? (speechSynthesis.getVoices() || []) : []; } catch (e) {} }
loadVoices();
if (window.speechSynthesis) { try { speechSynthesis.onvoiceschanged = loadVoices; } catch (e) {} }
// 男女(gender)から最適な声を選ぶ。無ければ言語一致の先頭。名前ヒントで判定
function pickVoice(lang, gender) {
  if (!ttsVoices.length) loadVoices();
  if (!ttsVoices.length) return null;
  const base = (lang || 'ja-JP').slice(0, 2).toLowerCase();
  const langV = ttsVoices.filter(v => (v.lang || '').toLowerCase().startsWith(base));
  const pool = langV.length ? langV : ttsVoices;
  if (gender === 'male' || gender === 'female') {
    const hints = gender === 'female'
      ? ['kyoko', 'o-ren', 'female', 'woman', 'girl', 'samantha', 'haruka', 'nanami', 'sara', 'mizuki']
      : ['otoya', 'hattori', 'male', 'man', 'daniel', 'ichiro', 'keita', 'takumi'];
    const m = pool.find(v => hints.some(h => (v.name || '').toLowerCase().includes(h)));
    if (m) return m;
  }
  return pool[0] || null;
}
function speak(text) {
  if (!config || !config.tts || !config.tts.enabled) return;
  if (!isOBS && !audioActive) return; // 音声OFF中は読み上げない
  const max = config.tts.maxLength || 60;
  ttsQueue.push(text.slice(0, max));
  processTts();
}
function processTts() {
  if (speaking || ttsQueue.length === 0) return;
  speaking = true;
  const t = config.tts || {};
  const u = new SpeechSynthesisUtterance(ttsQueue.shift());
  u.lang = (t.lang || 'ja-JP');
  u.rate = t.rate || 1.0;
  // 声の高さ: 明示指定があれば優先。無指定なら男=低め/女=高めの目安を自動適用
  if (t.pitch != null && t.pitch !== '') u.pitch = +t.pitch;
  else if (t.gender === 'male') u.pitch = 0.7;
  else if (t.gender === 'female') u.pitch = 1.3;
  if (t.volume != null && t.volume !== '') u.volume = +t.volume;
  const v = pickVoice(u.lang, t.gender);
  if (v) u.voice = v;
  u.onend = u.onerror = () => { speaking = false; processTts(); };
  speechSynthesis.speak(u);
}

// ---- アラート表示 ----
const alertQueue = [];
let alertShowing = false;
function showAlert(item) {
  alertQueue.push(item);
  processAlert();
}
function processAlert() {
  if (alertShowing || alertQueue.length === 0) return;
  alertShowing = true;
  const item = alertQueue.shift();
  const box = document.getElementById('alert');
  const av = document.getElementById('alertAvatar');
  const gi = document.getElementById('alertGift');
  document.getElementById('alertName').textContent = item.name;
  document.getElementById('alertDesc').innerHTML = item.desc;
  if (item.avatar) { av.src = item.avatar; av.style.display = ''; } else { av.style.display = 'none'; }
  if (item.giftImage) { gi.src = item.giftImage; gi.style.display = ''; } else { gi.style.display = 'none'; }
  box.classList.remove('hide');
  box.classList.add('show');
  playSound(item.sound, item.freq || 880);
  if (item.tts) speak(item.tts);
  setTimeout(() => {
    box.classList.add('hide');
    setTimeout(() => {
      box.classList.remove('show', 'hide');
      box.style.display = 'none';
      alertShowing = false;
      processAlert();
    }, 450);
  }, item.duration || 5000);
}

// ---- コメント欄 ----
function addChat(user, text, isEvent) {
  if (config && config.chatOverlay && !config.chatOverlay.enabled) return;
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg' + (isEvent ? ' event' : '');
  div.innerHTML =
    (user.avatar ? '<img src="' + user.avatar + '" alt="">' : '<div class="noavatar"></div>') +
    '<div><div class="name">' + esc(user.nickname) + '</div>' +
    '<div class="body">' + esc(text) + '</div></div>';
  chat.appendChild(div);
  const max = (config && config.chatOverlay && config.chatOverlay.maxMessages) || 8;
  while (chat.children.length > max) chat.removeChild(chat.firstChild);
}
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---- イベント受信 ----
socket.on('event', ev => {
  const a = (config && config.alerts) || {};
  switch (ev.type) {
    case 'chat':
      addChat(ev, ev.comment, false);
      if (config && config.tts && config.tts.readComments) {
        speak(ev.nickname + 'さん、' + ev.comment);
      }
      break;

    case 'gift': {
      const cfg = a.gift || {};
      if (cfg.enabled === false) break;
      if ((ev.diamonds || 0) < (cfg.minDiamonds || 0)) break;
      showAlert({
        name: ev.nickname + ' さん',
        desc: esc(ev.giftName) + ' <span class="count">x' + ev.count + '</span> ありがとう!',
        avatar: ev.avatar,
        giftImage: ev.giftImage,
        sound: giftSoundFor(ev.giftName, cfg.sound),
        freq: 1046,
        duration: cfg.duration || 6000,
        tts: (config.tts && config.tts.readGifts) ? (ev.nickname + 'さん、' + ev.giftName + ' ' + ev.count + '個ありがとうございます!') : null
      });
      addChat(ev, '🎁 ' + ev.giftName + ' x' + ev.count, true);
      break;
    }

    case 'follow': {
      const cfg = a.follow || {};
      if (cfg.enabled === false) break;
      showAlert({
        name: ev.nickname + ' さん',
        desc: 'フォローありがとう!',
        avatar: ev.avatar,
        sound: cfg.sound,
        freq: 784,
        duration: cfg.duration || 4000,
        tts: ev.nickname + 'さん、フォローありがとうございます!'
      });
      break;
    }

    case 'share': {
      const cfg = a.share || {};
      if (cfg.enabled === false) break;
      showAlert({
        name: ev.nickname + ' さん',
        desc: 'シェアありがとう!',
        avatar: ev.avatar,
        sound: cfg.sound,
        freq: 659,
        duration: cfg.duration || 4000
      });
      break;
    }

    case 'system':
      addChat({ nickname: 'システム', avatar: '' }, ev.message, true);
      break;
  }
});
